# Codespaces is the recommended per-language path (each language has its own
# .devcontainer/<language>/ config, so only that toolchain is installed).
# Gitpod's workspace-full image ships all toolchains, but we only bring up the
# shared services here and install each language's deps on demand — so a
# JavaScript learner never installs Ruby/Rust deps.
image: gitpod/workspace-full

tasks:
  - name: services
    command: |
      docker compose -f .devcontainer/docker-compose.yml up -d postgres redis
      export DATABASE_URL="postgresql://labs:labs@localhost:5432/labs"
      export REDIS_URL="redis://localhost:6379/0"
      echo "Postgres + Redis are up. Set up ONLY the language you want, then run the lab:"
      echo "  Python:  pip install -r .devcontainer/requirements.txt && pip install -e tooling/python/labkit"
      echo "  Node:    (cd tooling/node/labkit && npm install)"
      echo "  Ruby:    gem install pg redis"
      echo "  Rust:    (cd tooling/rust/labkit && cargo build)"
      echo "  Go / C / C++:  no extra setup (Go modules / libpq are ready)"
      echo "Then:  cd labs/<lab>/<language>  — see lab.json for run/test commands."

ports:
  - port: 5432
    visibility: private
    onOpen: ignore
  - port: 6379
    visibility: private
    onOpen: ignore
